<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ONE桌遊商家端 APP 下載</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft JhengHei', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            max-width: 500px;
            width: 100%;
            background: white;
            border-radius: 20px;
            padding: 40px 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            text-align: center;
        }

        .logo {
            font-size: 3em;
            margin-bottom: 10px;
        }

        h1 {
            color: #27ACB2;
            font-size: 2em;
            margin-bottom: 10px;
        }

        .subtitle {
            color: #666;
            margin-bottom: 40px;
            font-size: 1.1em;
        }

        .download-btn {
            display: block;
            width: 100%;
            padding: 20px;
            margin: 15px 0;
            border: none;
            border-radius: 15px;
            font-size: 1.2em;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            text-decoration: none;
            color: white;
            position: relative;
            overflow: hidden;
        }

        .download-btn::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: rgba(255,255,255,0.3);
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
        }

        .download-btn:hover::before {
            width: 300px;
            height: 300px;
        }

        .download-btn:active {
            transform: scale(0.98);
        }

        .android-btn {
            background: linear-gradient(135deg, #3DDC84 0%, #2BAF66 100%);
            box-shadow: 0 10px 30px rgba(61, 220, 132, 0.4);
        }

        .ios-btn {
            background: linear-gradient(135deg, #007AFF 0%, #0051D5 100%);
            box-shadow: 0 10px 30px rgba(0, 122, 255, 0.4);
        }

        .web-btn {
            background: linear-gradient(135deg, #27ACB2 0%, #1a8a8f 100%);
            box-shadow: 0 10px 30px rgba(39, 172, 178, 0.4);
        }

        .btn-icon {
            font-size: 1.5em;
            margin-right: 10px;
            vertical-align: middle;
        }

        .btn-text {
            vertical-align: middle;
            position: relative;
            z-index: 1;
        }

        .device-badge {
            display: inline-block;
            background: #ffc107;
            color: #333;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.8em;
            margin-left: 10px;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }

        .info {
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid #e0e0e0;
            color: #666;
            font-size: 0.9em;
        }

        .qr-hint {
            margin-top: 20px;
            color: #999;
            font-size: 0.85em;
        }

        @media (max-width: 500px) {
            .container {
                padding: 30px 20px;
            }

            h1 {
                font-size: 1.6em;
            }

            .download-btn {
                padding: 18px;
                font-size: 1.1em;
            }
        }

        .recommended {
            border: 3px solid #ffc107;
            animation: glow 2s infinite;
        }

        @keyframes glow {
            0%, 100% { box-shadow: 0 10px 30px rgba(255, 193, 7, 0.4); }
            50% { box-shadow: 0 10px 40px rgba(255, 193, 7, 0.7); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">🎮</div>
        <h1>ONE桌遊商家端 APP</h1>
        <p class="subtitle">一機管理全部店家，隨時掌握營運狀況！</p>

        <!-- 安卓下載 -->
        <a href="https://github.com/ken0900101318-beep/onegame-app-download/releases/download/v1.0.0/156.apk" 
           class="download-btn android-btn" 
           id="androidBtn"
           download>
            <span class="btn-icon">🤖</span>
            <span class="btn-text">Android 版下載</span>
        </a>

        <!-- iOS 下載 -->
        <a href="https://is.gd/IIdWcj" 
           class="download-btn ios-btn" 
           id="iosBtn"
           target="_blank">
            <span class="btn-icon">🍎</span>
            <span class="btn-text">iOS App Store</span>
        </a>

        <!-- 網頁版 -->
        <a href="https://store.onegame.tw/#/" 
           class="download-btn web-btn" 
           target="_blank">
            <span class="btn-icon">🌐</span>
            <span class="btn-text">網頁版（免安裝）</span>
        </a>

        <div class="info">
            <p>💡 <strong>商家管理者專用</strong>，一機管理全部店家</p>
            <p style="margin-top: 10px;">📱 支援 iOS 13+ / Android 6.0+</p>
        </div>

        <div class="qr-hint">
            💡 提示：用手機掃描 QR Code 可快速訪問此頁面
        </div>
    </div>

    <script>
        // 偵測裝置類型
        function detectDevice() {
            const userAgent = navigator.userAgent || navigator.vendor || window.opera;
            
            if (/android/i.test(userAgent)) {
                return 'android';
            }
            
            if (/iPad|iPhone|iPod/.test(userAgent) && !window.MSStream) {
                return 'ios';
            }
            
            return 'other';
        }

        // 標記推薦的下載按鈕
        window.addEventListener('DOMContentLoaded', function() {
            const device = detectDevice();
            
            if (device === 'android') {
                const androidBtn = document.getElementById('androidBtn');
                androidBtn.classList.add('recommended');
                androidBtn.innerHTML = '<span class="btn-icon">🤖</span><span class="btn-text">Android 版下載</span><span class="device-badge">推薦</span>';
            } else if (device === 'ios') {
                const iosBtn = document.getElementById('iosBtn');
                iosBtn.classList.add('recommended');
                iosBtn.innerHTML = '<span class="btn-icon">🍎</span><span class="btn-text">iOS App Store</span><span class="device-badge">推薦</span>';
            }
        });
    </script>
</body>
</html>
